    <radialGradient id="roseOuter" cx="38%" cy="30%" r="78%">
      <stop stop-color="#ef8aa0"/>
      <stop offset=".48" stop-color="#b6385c"/>
      <stop offset="1" stop-color="#57152e"/>
    </radialGradient>
    <radialGradient id="roseInner" cx="42%" cy="34%" r="72%">
      <stop stop-color="#ffd0d8"/>
      <stop offset=".34" stop-color="#d95a78"/>
      <stop offset="1" stop-color="#7e1e40"/>
    </radialGradient>
    <linearGradient id="roseGold" x1="0" y1="0" x2="1" y2="1">
