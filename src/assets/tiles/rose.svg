    <path fill="url(#roseInner)" d="M64 35c9-8 23-3 24 9 11-3 21 7 17 18 9 7 6 21-5 25-1 12-14 19-24 12-8 9-23 7-28-4-11 3-22-7-18-19-9-7-6-21 5-25 1-12 14-19 24-12 1-2 3-3 5-4Z"/>

    <path fill="#7b1d3b" d="M64 46c10 0 18 8 18 18 0 11-8 20-20 20-11 0-19-8-19-18 0-7 4-13 10-16-1 8 3 14 10 15 5 1 9-2 10-6 1-5-3-9-8-9-4 0-7 2-9 5 1-6 4-9 8-9Z"/>
    <path fill="none" stroke="#f4c387" stroke-width="3" stroke-linecap="round" d="M55 55c-3 8 2 16 10 16 7 0 11-6 9-12-2-5-8-7-12-4-4 3-4 9 0 12"/>
  </g>

</svg>
